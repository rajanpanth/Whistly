name: Anchor Build & Deploy to Devnet

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: backpackapp/build:v0.30.1
    env:
      RUSTUP_HOME: /root/.rustup
      CARGO_HOME: /root/.cargo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install latest Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Verify toolchain versions
        run: |
          echo "=== Rust ===" && rustc --version && cargo --version
          echo "=== Solana ===" && solana --version
          echo "=== Anchor ===" && anchor --version

      - name: Pin all high-MSRV packages for cargo-build-sbf compatibility
        run: |
          # The local cargo-build-sbf inside the Docker image uses rustc 1.75.0-dev.
          # We must forcefully downgrade crates that demand rustc 1.76 or higher.
          
          # Force a full dependency resolution first so that the lockfile is fully populated.
          cargo metadata --format-version 1 > /dev/null || true

          echo "Down-pinning high-MSRV crates..."
          
          downpin() {
            local crate=$1
            local prefix=$2
            local target=$3
            local versions=$(grep -A1 "name = \"$crate\"" Cargo.lock | grep version | cut -d '"' -f2)
            for ver in $versions; do
              case "$ver" in
                $prefix*) 
                  if [ "$ver" != "$target" ]; then
                    echo "Downgrading $crate@$ver to $target"
                    cargo update -p "$crate@$ver" --precise "$target" || true
                  fi
                  ;;
              esac
            done
          }

          # Target the specific high versions that cause rustc 1.76+ MSRV issues
          downpin "proc-macro-crate" "3." "3.1.0"
          downpin "indexmap" "2." "2.1.0"
          downpin "borsh" "1." "1.5.7"
          downpin "toml_edit" "0.23" "0.22.22"
          downpin "toml_datetime" "0.7" "0.6.11"
          downpin "toml_parser" "1." "0.1.5"
          downpin "winnow" "0.7" "0.6.26"
          downpin "hashbrown" "0.15" "0.14.5"
          downpin "thiserror" "1." "1.0.63"
          downpin "thiserror-impl" "1." "1.0.63"
          downpin "proc-macro2" "1." "1.0.86"
          downpin "syn" "2." "2.0.79"

          echo "=== Final key versions in Lockfile ==="
          grep -E 'name = "(borsh|toml_edit|toml_datetime|toml_parser|proc-macro-crate|indexmap|hashbrown|winnow)"' Cargo.lock -A1 | grep version || true

      - name: Downgrade Cargo.lock to v3 for cargo-build-sbf
        run: |
          # MUST run AFTER all cargo update steps — stable cargo rewrites lockfile as v4.
          # cargo-build-sbf (internal Cargo 1.75-dev) cannot parse v4 lockfiles.
          sed -i 's/^version = 4$/version = 3/' Cargo.lock
          echo "=== Lockfile version ==="
          head -3 Cargo.lock

      - name: Build instinctfi program
        run: anchor build -p instinctfi --no-idl

      - name: Configure Solana for Devnet
        run: solana config set --url devnet

      - name: Set up deployment wallet
        run: |
          echo '${{ secrets.ANCHOR_WALLET_KEYPAIR }}' > /tmp/deployer-keypair.json
          mkdir -p $HOME/.config/solana
          cp /tmp/deployer-keypair.json $HOME/.config/solana/id.json
          solana config set --keypair /tmp/deployer-keypair.json
          echo "Wallet address:"
          solana address
          echo "Balance:"
          solana balance || true

      - name: Airdrop SOL if needed
        run: |
          BALANCE=$(solana balance 2>/dev/null | awk '{print $1}' || echo "0")
          if [ "$(echo "$BALANCE < 2" | bc -l 2>/dev/null || echo 1)" -eq 1 ]; then
            echo "Airdropping SOL..."
            solana airdrop 2 || solana airdrop 1 || true
            sleep 5
            solana balance
          fi

      - name: Get Program ID from keypair
        id: program-id
        run: |
          PROGRAM_ID=$(solana-keygen pubkey target/deploy/instinctfi-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_OUTPUT
          echo "🚀 Program ID: $PROGRAM_ID"

      - name: Update declare_id in Rust source
        run: |
          sed -i "s/declare_id!(\"3RAY4WxQREyvDvZwCc4LJeXYhQmxnqDghqq4groQ16En\")/declare_id!(\"${{ steps.program-id.outputs.PROGRAM_ID }}\")/" programs/instinctfi/src/lib.rs
          grep declare_id programs/instinctfi/src/lib.rs

      - name: Update Anchor.toml
        run: |
          sed -i "s/instinctfi = \"3RAY4WxQREyvDvZwCc4LJeXYhQmxnqDghqq4groQ16En\"/instinctfi = \"${{ steps.program-id.outputs.PROGRAM_ID }}\"/g" Anchor.toml
          grep instinctfi Anchor.toml

      - name: Rebuild with real Program ID
        run: anchor build -p instinctfi --no-idl

      - name: Deploy to Devnet
        run: |
          echo "Deploying with wallet:"
          solana address
          echo "Balance:"
          solana balance
          anchor deploy -p instinctfi --provider.cluster devnet --provider.wallet /tmp/deployer-keypair.json

      - name: Verify deployment
        run: solana program show ${{ steps.program-id.outputs.PROGRAM_ID }} --url devnet

      - name: Print Program ID
        run: |
          echo "============================================"
          echo "✅ DEPLOYED PROGRAM ID:"
          echo "${{ steps.program-id.outputs.PROGRAM_ID }}"
          echo "============================================"
